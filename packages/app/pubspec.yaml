name: race_fueling_app
description: Flutter app for the Race Fueling Calculator (the "Bonk" planner UI).
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.8.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  race_fueling_core:
    path: ../core
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
